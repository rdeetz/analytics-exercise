version: 2

models:
  - name: dim_organizations
    description: >
      Organization dimension. Grain: one row per organization. Attributes plus
      derived tenure and signup-cohort fields for slicing other models.
    columns:
      - name: organization_id
        description: Primary key.
        tests: [unique, not_null]
      - name: organization_name
        description: Display name.
      - name: plan
        description: Subscription tier (starter / growth / enterprise).
      - name: organization_status
        description: Lifecycle status (active / churned / suspended).
      - name: is_active
        description: True when organization_status = 'active'.
      - name: clinician_seats
        description: Contracted clinician seats.
      - name: signed_up_at
        description: Org creation timestamp.
      - name: signup_cohort_month
        description: signed_up_at truncated to the first of the month (acquisition cohort).
      - name: tenure_days
        description: Days between signup and today.
      - name: is_recent_signup
        description: True when the org signed up within the last 6 months (Part 2 cohort).

  - name: fct_sessions
    description: >
      Session fact. Grain: one row per therapy session. Session facts with the
      1:1 note joined in; note columns are NULL for sessions without a note
      (abandoned / processing). Data-quality flags are carried through from staging.
    columns:
      - name: session_id
        description: Primary key.
        tests: [unique, not_null]
      - name: organization_id
        description: Org the session belongs to.
        tests:
          - not_null
          - relationships:
              to: ref('dim_organizations')
              field: organization_id
      - name: clinician_id
        description: Clinician who ran the session.
      - name: note_id
        description: Note generated from the session; NULL when none exists.
      - name: session_status
        description: completed / abandoned / processing.
      - name: is_completed
        description: True when the session completed.
      - name: started_at
        description: Session start timestamp.
      - name: started_date
        description: Date of started_at (for daily/period rollups).
      - name: duration_minutes
        description: Session length in minutes; populated only when has_valid_duration.
      - name: has_valid_duration
        description: True when a usable duration is present.
      - name: has_completion_anomaly
        description: DATA QUALITY — completed but missing ended_at/duration.
      - name: has_note
        description: True when a note row exists for the session.
      - name: note_is_successful
        description: True when the note generated successfully.
      - name: note_word_count
        description: Word count of the note; may be NULL.
      - name: note_clinician_edited
        description: Whether a clinician edited the note.
      - name: note_has_word_count_anomaly
        description: DATA QUALITY — note succeeded but word_count is NULL.

  - name: org_engagement_metrics
    description: >
      Per-organization engagement / stickiness metrics. Grain: one row per
      organization. Adoption, recent-usage momentum, recency, and AI-output
      quality — the reusable inputs to health/churn analysis (Part 2). Rate and
      average metrics are computed over valid rows only and guarded against
      divide-by-zero (NULL when undefined).
    columns:
      - name: organization_id
        description: Primary key.
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('dim_organizations')
              field: organization_id
      - name: plan
        description: Subscription tier.
      - name: organization_status
        description: Lifecycle status.
      - name: is_recent_signup
        description: Signed up within the last 6 months.
      - name: tenure_days
        description: Days since signup.
      - name: clinician_seats
        description: Contracted seats.
      - name: total_clinicians
        description: Clinicians belonging to the org.
      - name: activated_clinicians
        description: Clinicians with an activation timestamp.
      - name: active_clinicians
        description: Clinicians currently in 'active' status.
      - name: activation_rate
        description: activated_clinicians / total_clinicians. NULL if no clinicians.
      - name: seat_utilization
        description: active_clinicians / clinician_seats. >1 means more active clinicians than seats.
      - name: total_sessions
        description: All sessions ever, any status.
      - name: completed_sessions
        description: Sessions that completed.
      - name: abandoned_sessions
        description: Sessions that were abandoned.
      - name: completion_rate
        description: completed_sessions / total_sessions. NULL if no sessions.
      - name: avg_session_duration_minutes
        description: Mean duration over sessions with a valid duration (anomalous rows excluded).
      - name: sessions_last_30d
        description: Sessions started in the trailing 30 days.
      - name: sessions_prev_30d
        description: Sessions started in the 30–60-day window before now (momentum baseline).
      - name: session_trend_pct
        description: (last_30d - prev_30d) / prev_30d. NULL if no prior-window sessions.
      - name: active_clinicians_last_30d
        description: Distinct clinicians who ran a session in the last 30 days.
      - name: sessions_per_active_clinician_last_30d
        description: sessions_last_30d / active_clinicians_last_30d (recent intensity).
      - name: last_session_date
        description: Date of the most recent session.
      - name: days_since_last_session
        description: Days between the last session and today (recency / silence).
      - name: notes_total
        description: Notes generated (one per completed session).
      - name: note_success_rate
        description: notes_succeeded / notes_total. NULL if no notes.
      - name: clinician_edit_rate
        description: Share of successful notes a clinician edited (engagement with AI output).
